        /* 霓虹网格 */
        .neon-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            background: 
                linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px),
                linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-move 20s linear infinite;
        }
        
        @keyframes grid-move {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }
        
        /* 激光束 */
        .laser-beams {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }
        
        .laser {
            position: absolute;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #ff00ff, transparent);
            box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            animation: laser-sweep 3s ease-in-out infinite;
        }
        
        .laser:nth-child(1) { left: 20%; animation-delay: 0s; }
        .laser:nth-child(2) { left: 50%; animation-delay: 1s; background: linear-gradient(180deg, transparent, #00ffff, transparent); box-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff; }
        .laser:nth-child(3) { left: 80%; animation-delay: 2s; }
        
        @keyframes laser-sweep {
            0%, 100% { opacity: 0; transform: translateX(-100px) scaleY(0); }
            50% { opacity: 1; transform: translateX(0) scaleY(1); }
        }
        
        /* 闪电效果 */
        .lightning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .bolt {
            position: absolute;
            width: 3px;
            height: 150px;
            background: linear-gradient(180deg, #ffff00, #ff6600);
            box-shadow: 0 0 30px #ffff00, 0 0 60px #ff6600;
            animation: flash 2s infinite;
            opacity: 0;
        }
        
        .bolt:nth-child(1) { left: 15%; top: 10%; animation-delay: 0.5s; transform: rotate(15deg); }
        .bolt:nth-child(2) { left: 45%; top: 5%; animation-delay: 1.2s; transform: rotate(-10deg); }
        .bolt:nth-child(3) { left: 75%; top: 15%; animation-delay: 1.8s; transform: rotate(20deg); }
        
        @keyframes flash {
            0%, 90%, 100% { opacity: 0; }
            5% { opacity: 1; }
            10% { opacity: 0; }
            15% { opacity: 1; }
            20% { opacity: 0; }
        }
        
        /* 霓虹粒子 */
        .neon-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            animation: particle-float 8s infinite linear;
        }
        
        .particle:nth-child(odd) { background: #ff00ff; box-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        
        .particle:nth-child(1) { left: 10%; top: 100%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 25%; top: 100%; animation-delay: 1s; }
        .particle:nth-child(3) { left: 40%; top: 100%; animation-delay: 2s; }
        .particle:nth-child(4) { left: 55%; top: 100%; animation-delay: 3s; }
        .particle:nth-child(5) { left: 70%; top: 100%; animation-delay: 4s; }
        .particle:nth-child(6) { left: 85%; top: 100%; animation-delay: 5s; }
        .particle:nth-child(7) { left: 15%; top: 100%; animation-delay: 6s; }
        .particle:nth-child(8) { left: 60%; top: 100%; animation-delay: 7s; }
        
        @keyframes particle-float {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
        }
        
        /* 扫描线 */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, transparent, #ff00ff, #00ffff, #ff00ff, transparent);

            animation: scan 4s linear infinite;
            z-index: 3;
            pointer-events: none;
        }
        
        @keyframes scan {
            0% { top: -5px; }
            100% { top: 100vh; }
        }
        
        /* 脉冲光环 */
        .pulse-ring {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 2px solid rgba(0,255,255,0.3);
            border-radius: 50%;
            animation: pulse-expand 3s ease-out infinite;
            pointer-events: none;
            z-index: 1;
        }
        
        .pulse-ring:nth-child(2) { animation-delay: 1s; }
        .pulse-ring:nth-child(3) { animation-delay: 2s; }
        
        @keyframes pulse-expand {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; border-color: rgba(0,255,255,0.5); }
